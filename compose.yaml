services:
  traefik:
    image: traefik:v3.6.2
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80

  frontend-build:
    build: ./frontend
    volumes:
      - static:/out
    restart: "no"

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - static:/srv/www
    depends_on:
      - frontend-build
    labels:
      - traefik.enable=true
      - traefik.http.routers.static.rule=PathPrefix(`/`)
      - traefik.http.routers.static.entrypoints=web
      - traefik.http.routers.static.priority=1
      - traefik.http.routers.static.service=caddy
      - traefik.http.services.caddy.loadbalancer.server.port=80

  app:
    build: .
    environment:
      APP_ENV: dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.priority=100
      - traefik.http.routers.api.service=app
      - traefik.http.services.app.loadbalancer.server.port=8080

volumes:
  static:
